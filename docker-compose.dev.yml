version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: suivi-ban-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: suivi_ban
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - suivi-ban-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data_dev:

networks:
  suivi-ban-network:
    driver: bridge


